<!DOCTYPE html>
<html>
<head>
<title>Library Management System</title>

<link rel="stylesheet" href="librarmg.css">

</head>

<body>

<header>
<h1>Library Management System</h1>
</header>

<!-- LOGIN -->

<div id="loginPage" class="center">

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" class="page">

<div class="btnnn">
<button onclick="showPage('addPage')">
<img src="library_add_check_64dp_000000_FILL0_wght400_GRAD0_opsz48.png">
<span>Add Book</span>
</button>
</div>

<div class="btnnnn">
<button onclick="showPage('listPage')">
<img src="library_books_64dp_000000_FILL0_wght400_GRAD0_opsz48.png">
<span>List Books</span>
</button>
</div>

<div class="btnnnn">
<button onclick="showPage('scannerPage')">
<img src="scan-barcode.svg">
<span>Scanner</span>
</button>
</div>

<div class="btnnnn">
<button onclick="showPage('issuePage')">
<span>Issue / Return</span>
</button>
</div>

</div>


<!-- ADD BOOK -->

<div id="addPage" class="page">

<h2>Add Book</h2>

<input id="title" placeholder="Book Title">
<input id="author" placeholder="Author">
<input id="location" placeholder="Location">

<button onclick="addBook()">Add Book</button>

<button onclick="showPage('dashboard')">Back</button>

</div>



<!-- LIST BOOKS -->

<div id="listPage" class="page">

<h2>Library Books</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Author</th>
<th>Status</th>
<th>Location</th>
</tr>
</thead>

<tbody id="bookTable"></tbody>

</table>

<button onclick="showPage('dashboard')">Back</button>

</div>



<!-- ISSUE PAGE -->

<div id="issuePage" class="page">

<h2>Issue / Return</h2>

<input id="bookId" placeholder="Enter Book ID">

<button onclick="issueBook()">Issue</button>
<button onclick="returnBook()">Return</button>

<button onclick="showPage('dashboard')">Back</button>

</div>



<!-- SCANNER PAGE -->

<!-- SCANNER PAGE -->

<div id="scannerPage" class="page">

<h2>Scan Book Barcode</h2>

<input 
id="barcodeInput"
placeholder="Scan ISBN barcode"
onchange="fetchBook()"
autofocus
>

<h3>Book Details</h3>

<p>Title: <span id="scanTitle"></span></p>
<p>Author: <span id="scanAuthor"></span></p>

<input id="scanLocation" placeholder="Enter Shelf Location">

<button onclick="addScannedBook()">Add Book</button>

<button onclick="showPage('dashboard')">Back</button>

</div>

<script src="script.js"></script>

</body>
</html>
